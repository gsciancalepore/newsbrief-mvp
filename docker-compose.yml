services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-newsbrief_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret_password}
      POSTGRES_DB: ${DB_NAME:-newsbrief_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-newsbrief_user} -d ${DB_NAME:-newsbrief_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-newsbrief_user}:${DB_PASSWORD:-secret_password}@db:5432/${DB_NAME:-newsbrief_db}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A src.infrastructure.celery.config.app worker --pool=solo --concurrency=1 --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-newsbrief_user}:${DB_PASSWORD:-secret_password}@db:5432/${DB_NAME:-newsbrief_db}
      - REDIS_URL=redis://redis:6379/0

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A src.infrastructure.celery.config.app beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-newsbrief_user}:${DB_PASSWORD:-secret_password}@db:5432/${DB_NAME:-newsbrief_db}
      - REDIS_URL=redis://redis:6379/0

volumes:
  pgdata: