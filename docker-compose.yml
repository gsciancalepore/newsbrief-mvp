version: '3.8'

services:
  # Base de Datos
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: newsbrief_db
      POSTGRES_USER: newsbrief_user
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsbrief_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Broker de Mensajes y Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API FastAPI
  api:
    build: .
    command: uvicorn src.interfaces.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://newsbrief_user:secret_password@postgres:5432/newsbrief_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY} # Usa la variable de tu sistema host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker Celery (Procesamiento pesado)
  worker:
    build: .
    command: celery -A src.infrastructure.celery.config worker --loglevel=info
    volumes:
      - ./src:/app/src
    environment:
      - DATABASE_URL=postgresql://newsbrief_user:secret_password@postgres:5432/newsbrief_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY} # Usa la variable de tu sistema host
    depends_on:
      - postgres
      - redis

  # Celery Beat (Scheduler para tareas periódicas)
  beat:
    build: .
    command: celery -A src.infrastructure.celery.config beat --loglevel=info
    volumes:
      - ./src:/app/src
    environment:
      - DATABASE_URL=postgresql://newsbrief_user:secret_password@postgres:5432/newsbrief_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data: